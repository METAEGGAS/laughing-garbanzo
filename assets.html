<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>الأصول</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Tajawal,Cairo,"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(160deg,#eef6ff 0%,#ddeeff 100%);color:#1e2430;min-height:100dvh}svg{display:block}.app{min-height:100dvh}.page{display:none;min-height:100dvh}.page.on{display:block}.w{padding:18px 14px 0;max-width:720px;margin:auto}.ttl{font-size:18px;font-weight:900;color:#1a2233;margin:10px 6px 16px;letter-spacing:.2px}.card{background:#fff;border-radius:26px;padding:22px 20px;box-shadow:0 12px 36px rgba(80,130,200,.13),0 2px 8px rgba(80,130,200,.07)}.s{font-size:13px;color:#8898ae;margin-bottom:6px;font-weight:800;letter-spacing:.3px}.v{font-size:36px;font-weight:900;color:#0070e0;margin-bottom:24px;letter-spacing:.6px}.mid{display:flex;justify-content:space-between;align-items:center;gap:12px}.coins{flex:1;display:flex;flex-direction:column;gap:13px}.r{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:#2c3a4a}.q{width:15px;height:15px;border-radius:5px;flex:none;box-shadow:0 2px 6px rgba(0,0,0,.15)}.p{margin-right:auto;font-size:13px;color:#6878a0;font-weight:700}.ch{position:relative;width:165px;height:165px;flex:none}.ci{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}.ci b{font-size:11px;color:#8898ae;margin-bottom:4px;font-weight:800}.ci span{font-size:13px;font-weight:900;color:#2c3a4a}.trk{stroke:#e4ecf5}.seg{fill:none;stroke-width:16;stroke-linecap:round;stroke-dasharray:0 100;transition:stroke-dasharray .9s cubic-bezier(.2,.8,.2,1),stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)}.hr{height:1.5px;background:linear-gradient(90deg,#e4ecf5,#c8dff0,#e4ecf5);margin:22px 0}.st{display:grid;grid-template-columns:1fr 1fr;gap:13px}.bx{background:linear-gradient(135deg,#f4f9ff,#eaf3ff);border:1.5px solid #d8eaf8;border-radius:18px;padding:15px 12px;text-align:center}.bx b{display:block;font-size:12px;color:#8898ae;margin-bottom:7px;font-weight:800}.bx span{display:block;font-size:16px;font-weight:900;color:#2c3a4a}#loader{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;font-size:14px;font-weight:800;color:#0070e0}#loader div{width:40px;height:40px;border:3.5px solid #d0e8ff;border-top-color:#0070e0;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:390px){.mid{flex-direction:column-reverse;align-items:stretch}.ch{margin:auto}.v{font-size:30px}.card{padding:18px 14px}}</style></head><body>
<div id="loader"><div></div>جارٍ تحميل بياناتك…</div>
<svg width="0" height="0" style="position:absolute"><symbol id="home" viewBox="0 0 24 24"><path d="M3 11.2 12 4l9 7.2v8.3a1.5 1.5 0 0 1-1.5 1.5H4.5A1.5 1.5 0 0 1 3 19.5Z"/><path d="M9 15h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></symbol><symbol id="market" viewBox="0 0 24 24"><path d="M5 18V11M10 18V7M15 18v-4M20 18V5"/><path d="m4 9 4-3 4 2 5-4 3 1"/></symbol><symbol id="trade" viewBox="0 0 24 24"><path d="M6 6v12M12 4v16M18 7v10"/><rect x="4.3" y="8.2" width="3.4" height="5" rx="1.6"/><rect x="10.3" y="11" width="3.4" height="5" rx="1.6"/><rect x="16.3" y="8.2" width="3.4" height="5" rx="1.6"/></symbol><symbol id="bag" viewBox="0 0 24 24"><path d="M8 8c0-2.2 1.8-4 4-4s4 1.8 4 4"/><path d="M5 9h14l-1.2 9.4A2 2 0 0 1 15.8 20H8.2a2 2 0 0 1-2-1.6Z"/><path d="M12 12v4M10.6 13.4c.5-.6 1-.8 1.4-.8.8 0 1.4.4 1.4 1 0 .8-.7 1-1.4 1s-1.4.2-1.4 1c0 .6.6 1 1.4 1 .5 0 1-.2 1.4-.8" stroke-width="1.4"/></symbol><symbol id="me" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></symbol></svg>
<div class="app">
  <div id="h" class="page"><div class="w"><div class="ttl">الصفحة الرئيسية</div></div></div>
  <div id="m" class="page"><div class="w"><div class="ttl">الأسواق</div></div></div>
  <div id="t" class="page"><div class="w"><div class="ttl">التداول</div></div></div>
  <div id="a" class="page on"><div class="w">
    <div class="ttl">الأصول</div>
    <div class="card">
      <div class="s">إجمالي أصول الحساب</div>
      <div class="v" id="balVal">-- USDT</div>
      <div class="mid">
        <div class="coins">
          <div class="r"><i class="q" style="background:#f5a823"></i><span>USDT</span><span class="p" id="pUsdt">--%</span></div>
          <div class="r"><i class="q" style="background:#2b9ef4"></i><span>BTC</span><span class="p">0.00%</span></div>
          <div class="r"><i class="q" style="background:#3db85a"></i><span>ETH</span><span class="p">0.00%</span></div>
          <div class="r"><i class="q" style="background:#ffcc80"></i><span>USDC</span><span class="p">0.00%</span></div>
          <div class="r"><i class="q" style="background:#ff9800"></i><span>TRX</span><span class="p">0.00%</span></div>
        </div>
        <div class="ch">
          <svg viewBox="0 0 160 160" width="165" height="165">
            <circle class="trk" cx="80" cy="80" r="52" fill="none" stroke-width="16"/>
            <circle class="seg" cx="80" cy="80" r="52" pathLength="100" transform="rotate(-90 80 80)" stroke="#f5a823"/>
            <circle class="seg" cx="80" cy="80" r="52" pathLength="100" transform="rotate(-90 80 80)" stroke="#2b9ef4"/>
            <circle class="seg" cx="80" cy="80" r="52" pathLength="100" transform="rotate(-90 80 80)" stroke="#3db85a"/>
            <circle class="seg" cx="80" cy="80" r="52" pathLength="100" transform="rotate(-90 80 80)" stroke="#ffcc80"/>
            <circle class="seg" cx="80" cy="80" r="52" pathLength="100" transform="rotate(-90 80 80)" stroke="#ff9800"/>
          </svg>
          <div class="ci"><b>إجمالي الأصول</b><span id="ciVal">--</span></div>
        </div>
      </div>
      <div class="hr"></div>
      <div class="st">
        <div class="bx"><b>إجمالي الدخل الشخصي</b><span id="s0">-- USDT</span></div>
        <div class="bx"><b>الدخل الشخصي اليوم</b><span id="s1">-- USDT</span></div>
        <div class="bx"><b>إجمالي إيرادات الفريق</b><span id="s2">0 USDT</span></div>
        <div class="bx"><b>أرباح الفريق اليوم</b><span id="s3">0 USDT</span></div>
      </div>
    </div>
  </div></div>
  <div id="u" class="page"><div class="w"><div class="ttl">ملكي</div></div></div>
</div>

<script>
const $=i=>document.getElementById(i),segs=[...document.querySelectorAll(".seg")],vals=[88,3,3,3,3];
function ring(){let o=0;segs.forEach((c,i)=>{c.style.strokeDasharray=`${vals[i]} ${100-vals[i]}`;c.style.strokeDashoffset=-o;o+=vals[i]})}
setTimeout(ring,120);
const pages=[...document.querySelectorAll(".page")],n=[...document.querySelectorAll(".n")];
n.forEach(x=>x.onclick=()=>{n.forEach(v=>v.classList.remove("on","home"));pages.forEach(v=>v.classList.remove("on"));x.classList.add("on");x.dataset.p=="h"&&x.classList.add("home");$(x.dataset.p).classList.add("on");x.dataset.p=="a"&&setTimeout(()=>{segs.forEach(c=>c.style.strokeDasharray="0 100");setTimeout(ring,60)},10);scrollTo({top:0,behavior:"smooth"})});
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import{getFirestore,doc,getDoc,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyBOUqLixfphg3b8hajc4hkwV-VJmldGBVw",authDomain:"randers-c640b.firebaseapp.com",projectId:"randers-c640b",storageBucket:"randers-c640b.firebasestorage.app",messagingSenderId:"391496092929",appId:"1:391496092929:web:58208b4eb3e6f9a8571f00"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app);
const L=document.getElementById("loader");
const fmt=n=>Number(n||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});

function applyUI(d){
  const bal=d.balance||0;
  document.getElementById("balVal").textContent=fmt(bal)+" USDT";
  document.getElementById("ciVal").textContent="≈$"+fmt(bal);
  document.getElementById("pUsdt").textContent="100%";
  document.getElementById("s0").textContent=fmt(d.totalIncome??bal)+" USDT";
  document.getElementById("s1").textContent=fmt(d.todayIncome??0)+" USDT";
  document.getElementById("s2").textContent=fmt(d.teamRevenue??0)+" USDT";
  document.getElementById("s3").textContent=fmt(d.teamTodayProfit??0)+" USDT";
  L.style.display="none";
}

onAuthStateChanged(auth,async user=>{
  if(!user){L.style.display="none";return;}
  try{
    // 1. Try by UID
    const snap=await getDoc(doc(db,"users",user.uid));
    if(snap.exists()){applyUI(snap.data());return;}
    // 2. Try by email field
    const q=query(collection(db,"users"),where("email","==",user.email));
    const qs=await getDocs(q);
    if(!qs.empty){applyUI(qs.docs[0].data());return;}
    // 3. Fallback: no data
    L.style.display="none";
  }catch(e){console.error(e);L.style.display="none";}
});
</script>
</body></html>
