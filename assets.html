<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>الأصول</title><style>:root{--b:#0d84ff;--bg1:#f7fbff;--bg2:#eaf3ff;--t:#18212e;--m:#7b8794;--bd:#e3eefc;--ok:#12b76a;--er:#ef4444}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Tajawal,Cairo,"Segoe UI",Tahoma,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--t)}.app{min-height:100dvh;padding:14px;display:grid}.card{width:min(100%,760px);min-height:calc(100dvh - 28px);margin:auto;background:rgba(255,255,255,.94);border:1px solid var(--bd);border-radius:28px;padding:18px;box-shadow:0 18px 50px rgba(13,132,255,.08);display:flex;flex-direction:column;justify-content:space-between}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.ttl{font-size:24px;font-weight:700}.tag{padding:8px 12px;border-radius:999px;background:#eef6ff;color:var(--b);font-size:13px;font-weight:700}.tag.off{background:#fff0f0;color:#d63c3c}.tag.load{background:#fff7e7;color:#b7791f}.lab{font-size:13px;color:var(--m);font-weight:600;margin-top:20px}.bal{font-size:clamp(34px,8vw,54px);font-weight:700;color:var(--b);margin:8px 0 10px;letter-spacing:.2px;line-height:1.1}.sub{display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:#55606d;font-size:14px;font-weight:600}.dot{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px #e8fbf1}.dot.off{background:var(--er);box-shadow:0 0 0 4px #ffecec}.hero{padding:18px 0 10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px}.bx{background:#f8fbff;border:1px solid #e7eef8;border-radius:18px;padding:14px}.bx b{display:block;font-size:12px;color:var(--m);font-weight:700;margin-bottom:8px}.bx span{display:block;font-size:16px;font-weight:700;word-break:break-word}.err{display:none;margin-top:14px;padding:12px 14px;border-radius:16px;background:#fff3f3;color:#d63c3c;font-size:13px;font-weight:700}.foot{margin-top:auto;padding-top:14px;font-size:12px;color:#90a0b1;text-align:center;font-weight:700}@media(max-width:560px){.card{padding:16px;border-radius:22px}.ttl{font-size:21px}.grid{grid-template-columns:1fr}}</style></head><body><div class="app"><div class="card"><div><div class="top"><div class="ttl">الأصول</div><div id="st" class="tag load">جارِ التحقق...</div></div><div class="hero"><div class="lab">إجمالي رصيد الحساب</div><div id="bal" class="bal">0 USDT</div><div class="sub"><i id="dot" class="dot off"></i><span id="mail">—</span></div></div><div class="grid"><div class="bx"><b>حالة الجلسة</b><span id="st2">جارِ التحقق...</span></div><div class="bx"><b>البريد الإلكتروني</b><span id="mail2">—</span></div><div class="bx"><b>مصدر البيانات</b><span>Firebase / Firestore</span></div><div class="bx"><b>الحقل المستخدم</b><span>balance</span></div></div><div id="err" class="err"></div></div><div class="foot">Live Balance</div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";import{getAnalytics,isSupported}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";import{getFirestore,collection,query,where,limit,onSnapshot}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBOUqLixfphg3b8hajc4hkwV-VJmldGBVw",authDomain:"randers-c640b.firebaseapp.com",projectId:"randers-c640b",storageBucket:"randers-c640b.firebasestorage.app",messagingSenderId:"391496092929",appId:"1:391496092929:web:58208b4eb3e6f9a8571f00",measurementId:"G-DBDSVVF7PS"},app=initializeApp(firebaseConfig);isSupported().then(v=>v&&getAnalytics(app)).catch(()=>{});const auth=getAuth(app),db=getFirestore(app),$=s=>document.querySelector(s),fmt=n=>(+n||0).toLocaleString("en-US",{maximumFractionDigits:2})+" USDT";let un=()=>{};function ui(o={}){"status"in o&&($("#st").textContent=o.status,$("#st2").textContent=o.status,$("#st").className="tag "+(o.mode||""));"email"in o&&($("#mail").textContent=o.email||"—",$("#mail2").textContent=o.email||"—");"balance"in o&&($("#bal").textContent=fmt(o.balance));"login"in o&&($("#dot").className="dot"+(o.login?"":" off"));"err"in o&&($("#err").style.display=o.err?"block":"none",$("#err").textContent=o.err||"")}ui({status:"جارِ التحقق...",mode:"load",email:"—",balance:0,login:0});onAuthStateChanged(auth,u=>{un();ui({err:""});if(!u)return ui({status:"غير مسجل دخول",mode:"off",email:"—",balance:0,login:0,err:"لا توجد جلسة مستخدم حالياً."});ui({status:"تم تسجيل الدخول",mode:"",email:u.email||"بدون بريد",login:1});const q=query(collection(db,"users"),where("email","==",(u.email||"").trim()),limit(1));un=onSnapshot(q,s=>{if(s.empty)return ui({balance:0,err:"المستخدم مسجل دخول لكن لا يوجد مستند مطابق للبريد داخل Collection اسمها users."});const d=s.docs[0].data();ui({balance:d.balance??0})},e=>ui({status:"خطأ",mode:"off",balance:0,login:0,err:e.message||"تعذر قراءة البيانات"}))});</script></body></html>
