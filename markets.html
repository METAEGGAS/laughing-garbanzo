<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>يقتبس</title>
<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#fff;color:#111}
svg{display:block}
button,input{font:inherit;outline:0}
.app{min-height:100dvh;padding-bottom:82px}
.wrap{max-width:720px;margin:auto;padding:22px 0 28px}
.top{display:flex;align-items:center;gap:18px;direction:ltr;padding:0 24px}
.lg{font-size:30px;font-weight:800}
.sr{flex:1;height:52px;border:1px solid #ece7ef;background:#f7f4f7;border-radius:30px;display:flex;align-items:center;padding:0 14px}
.sr input{flex:1;border:0;outline:0;background:none;font-size:21px;color:#8f8a94;direction:rtl}
.sr input::placeholder{color:#c9c4cc}
.sr svg{width:27px;height:27px;fill:none;stroke:#8f8a94;stroke-width:1.7}
.sbar{display:flex;align-items:center;gap:7px;padding:6px 26px 2px;font-size:12px;color:#aaa}
.dot{width:7px;height:7px;border-radius:50%;background:#29c061;flex-shrink:0;animation:pulse 2s infinite}
.dot.ld{background:#f5a623;animation:blink .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tabs{display:flex;justify-content:space-around;direction:ltr;margin:18px 0 0;border-bottom:1px solid #e9e9e9}
.tab{position:relative;border:0;background:none;color:#9c9c9c;font-size:22px;padding:0 8px 14px;cursor:pointer;transition:color .2s}
.tab.on{color:#1a73e8}
.tab.on:after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:calc(100% - 6px);height:4px;background:#1a73e8;border-radius:99px}
.w{padding:12px 24px 0}
.h,.r{display:grid;grid-template-columns:1.22fr .92fr auto;align-items:center;direction:ltr}
.h{color:#666;font-size:18px;margin:3px 0 8px}
.h div:nth-child(2){text-align:left}
.h div:nth-child(3){text-align:right}
.r{gap:8px;padding:15px 0 16px;border-bottom:1px solid #f2f2f2;border-radius:6px;transition:background .3s}
.r:last-child{border-bottom:none}
.nm{font-size:24px;line-height:1.08;font-weight:600}
.vl{margin-top:6px;color:#8f8f8f;font-size:13px}
.pr{font-size:24px;text-align:left;font-weight:700;transition:color .25s}
.up{color:#24b868}
.dn{color:#e35b7f}
.pc{justify-self:end;min-width:110px;padding:9px 14px;border-radius:999px;text-align:center;color:#fff;font-size:17px;font-weight:700;transition:background .3s}
.pc.up{background:#29c061}
.pc.dn{background:#ee5a77}
@keyframes fUp{0%{background:transparent}40%{background:rgba(36,184,104,.18)}100%{background:transparent}}
@keyframes fDn{0%{background:transparent}40%{background:rgba(227,91,127,.16)}100%{background:transparent}}
.r.fu{animation:fUp .55s ease}
.r.fd{animation:fDn .55s ease}
.nav{height:78px;background:#fff;display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 -8px 24px rgba(116,152,192,.09);position:fixed;left:0;right:0;bottom:0;z-index:99;direction:ltr}
.n{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#b1afd0;font-size:12px;font-weight:800;cursor:pointer;user-select:none;transition:color .2s}
.n svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.n.act{color:#0d84ff}
.n.hm svg{fill:currentColor;stroke:none}
.press:active{transform:scale(.97)}
@media(max-width:430px){
.wrap{max-width:100%}
.top{padding:0 18px}
.lg{font-size:24px}
.sr{height:48px}
.sr input{font-size:18px}
.tabs{margin-top:16px}
.tab{font-size:18px;padding-bottom:12px}
.w{padding:10px 18px 0}
.h{font-size:14px}
.nm,.pr{font-size:18px}
.pc{min-width:90px;font-size:15px;padding:8px 11px}
}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute;overflow:hidden">
<symbol id="ico-home" viewBox="0 0 24 24"><path d="M3 11.2 12 4l9 7.2v8.3a1.5 1.5 0 0 1-1.5 1.5H4.5A1.5 1.5 0 0 1 3 19.5Z"></path><path d="M9 15h6" stroke-width="1.8" stroke-linecap="round"></path></symbol>
<symbol id="ico-market" viewBox="0 0 24 24"><path d="M5 18V11M10 18V7M15 18v-4M20 18V5"></path><path d="m4 9 4-3 4 2 5-4 3 1" fill="none"></path></symbol>
<symbol id="ico-trade" viewBox="0 0 24 24"><path d="M6 6v12M12 4v16M18 7v10"></path><rect x="4.3" y="8.2" width="3.4" height="5" rx="1.6"></rect><rect x="10.3" y="11" width="3.4" height="5" rx="1.6"></rect><rect x="16.3" y="8.2" width="3.4" height="5" rx="1.6"></rect></symbol>
<symbol id="ico-bag" viewBox="0 0 24 24"><path d="M8 8c0-2.2 1.8-4 4-4s4 1.8 4 4"></path><path d="M5 9h14l-1.2 9.4A2 2 0 0 1 15.8 20H8.2a2 2 0 0 1-2-1.6Z"></path></symbol>
<symbol id="ico-me" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4 20a8 8 0 0 1 16 0"></path></symbol>
</svg>
<div class="app">
<div class="wrap">
<div class="top">
<div class="lg">يقتبس</div>
<label class="sr">
<input id="q" placeholder="بحث">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4.35-4.35"></path></svg>
</label>
</div>
<div class="sbar"><div class="dot ld" id="dot"></div><span id="stxt">جارٍ التحميل…</span></div>
<div class="tabs" id="b"></div>
<div class="w">
<div class="h"><div>اسم</div><div>أحدث السعر</div><div>24 ساعة ▲▼</div></div>
<div id="l"></div>
</div>
</div>
<nav class="nav">
<div class="n press" id="nHome"><svg><use href="#ico-home"></use></svg><div>الرئيسية</div></div>
<div class="n act press" id="nMarket"><svg><use href="#ico-market"></use></svg><div>الأسواق</div></div>
<div class="n press" id="nTrade"><svg><use href="#ico-trade"></use></svg><div>التداول</div></div>
<div class="n press" id="nAssets"><svg><use href="#ico-bag"></use></svg><div>الأصول</div></div>
<div class="n press" id="nMe"><svg><use href="#ico-me"></use></svg><div>ملكي</div></div>
</nav>
</div>
<script>
const T=[
["العملة الرقمية",["BTC/USDT","ETH/USDT","ADA/USDT","BCH/USDT","DASH/USDT","DOGE/USDT","DOT/USDT","FIL/USDT"]],
["الفوركس",["EUR/USDT","GBP/USDT","AUD/USDT","NZD/USDT","HKD/USDT","TRY/USDT","BRL/USDT","INR/USDT"]],
["المعادن الثمينة",["XAU/USDT","XAG/USDT","XPT/USDT","XPD/USDT"]]
];
const PREC={"BTC/USDT":2,"ETH/USDT":2,"ADA/USDT":4,"BCH/USDT":2,"DASH/USDT":3,"DOGE/USDT":4,"DOT/USDT":3,"FIL/USDT":4,"EUR/USDT":5,"GBP/USDT":6,"AUD/USDT":6,"NZD/USDT":6,"HKD/USDT":5,"TRY/USDT":4,"BRL/USDT":4,"INR/USDT":5,"XAU/USDT":3,"XAG/USDT":3,"XPT/USDT":2,"XPD/USDT":1};
const SEED_P={"BTC/USDT":83480,"ETH/USDT":1823,"ADA/USDT":0.7251,"BCH/USDT":314.2,"DASH/USDT":24.91,"DOGE/USDT":0.1728,"DOT/USDT":4.83,"FIL/USDT":3.19,"EUR/USDT":1.08231,"GBP/USDT":1.29344,"AUD/USDT":0.62453,"NZD/USDT":0.57121,"HKD/USDT":0.12853,"TRY/USDT":0.02717,"BRL/USDT":0.17342,"INR/USDT":0.011782,"XAU/USDT":3083.4,"XAG/USDT":33.46,"XPT/USDT":960.1,"XPD/USDT":969.3};
const SEED_C={"BTC/USDT":2.14,"ETH/USDT":-1.07,"ADA/USDT":3.92,"BCH/USDT":-0.74,"DASH/USDT":1.43,"DOGE/USDT":2.98,"DOT/USDT":-2.11,"FIL/USDT":-0.98,"EUR/USDT":0.21,"GBP/USDT":-0.09,"AUD/USDT":0.37,"NZD/USDT":-0.28,"HKD/USDT":0.01,"TRY/USDT":-1.18,"BRL/USDT":-0.81,"INR/USDT":0.09,"XAU/USDT":1.19,"XAG/USDT":2.21,"XPT/USDT":-0.48,"XPD/USDT":0.71};
const VOL_F={"BTC/USDT":0.0018,"ETH/USDT":0.0022,"ADA/USDT":0.0030,"BCH/USDT":0.0025,"DASH/USDT":0.0028,"DOGE/USDT":0.0035,"DOT/USDT":0.0030,"FIL/USDT":0.0032,"EUR/USDT":0.0003,"GBP/USDT":0.0004,"AUD/USDT":0.0004,"NZD/USDT":0.0004,"HKD/USDT":0.0001,"TRY/USDT":0.0006,"BRL/USDT":0.0005,"INR/USDT":0.0002,"XAU/USDT":0.0008,"XAG/USDT":0.0012,"XPT/USDT":0.0010,"XPD/USDT":0.0010};
const CG={bitcoin:"BTC/USDT",ethereum:"ETH/USDT",cardano:"ADA/USDT","bitcoin-cash":"BCH/USDT",dash:"DASH/USDT",dogecoin:"DOGE/USDT",polkadot:"DOT/USDT",filecoin:"FIL/USDT"};
const FX=["EUR","GBP","AUD","NZD","HKD","TRY","BRL","INR"];
const MT={"XAU/USDT":"GC=F","XAG/USDT":"SI=F","XPT/USDT":"PL=F","XPD/USDT":"PA=F"};
const D={},real={},prev={};
let tab=0,u=1;
Object.keys(SEED_P).forEach(k=>{D[k]={p:SEED_P[k],c:SEED_C[k]||0,v:0};prev[k]=SEED_P[k];});
const $=id=>document.getElementById(id);
const $q=$("q"),$b=$("b"),$l=$("l"),$dot=$("dot"),$stxt=$("stxt");
const fmt=(n,k)=>(+n||0).toFixed(PREC[k]??4);
const fmtVol=n=>{const v=+n||0;if(!v)return"—";if(v>=1e9)return"VOL "+(v/1e9).toFixed(1)+"B";if(v>=1e6)return"VOL "+(v/1e6).toFixed(1)+"M";if(v>=1e3)return"VOL "+(v/1e3).toFixed(1)+"K";return"VOL "+v.toFixed(2);};
const fmtPc=n=>(n>0?"+":"")+(+n||0).toFixed(2)+"%";
const row=k=>{const x=D[k]||{p:0,c:0,v:0};const s=x.c>=0?"up":"dn";const ri=real[k]?'<span style="color:#29c061;font-size:10px;vertical-align:middle">●</span>':'';return`<div class="r" id="r_${k.replace('/','_')}"><div><div class="nm">${k} ${ri}</div><div class="vl">${fmtVol(x.v)}</div></div><div class="pr ${s}">${fmt(x.p,k)}</div><div class="pc ${s}">${fmtPc(x.c)}</div></div>`;};
const draw=()=>{[...$b.children].forEach((e,i)=>e.classList.toggle("on",i===tab));const s=$q.value.trim().toUpperCase();$l.innerHTML=T[tab][1].filter(k=>k.includes(s)).map(row).join("");};
const simTick=()=>{
Object.keys(D).forEach(k=>{const vf=VOL_F[k]||0.002;const g=(Math.random()+Math.random()+Math.random()-1.5);const delta=g*vf;D[k].p*=(1+delta);D[k].c+=(Math.random()-0.5)*0.05;D[k].c=Math.max(-30,Math.min(30,D[k].c));});
const s=$q.value.trim().toUpperCase();
T[tab][1].filter(k=>k.includes(s)).forEach(k=>{const el=document.getElementById("r_"+k.replace("/","_"));if(!el)return;const x=D[k];const s2=x.c>=0?"up":"dn";const prEl=el.children[1];const pcEl=el.children[2];const wasUp=x.p>=(prev[k]||x.p);if(Math.abs(x.p-(prev[k]||x.p))/(prev[k]||1)>0.00005){el.classList.remove("fu","fd");void el.offsetWidth;el.classList.add(wasUp?"fu":"fd");}prev[k]=x.p;prEl.className="pr "+s2;prEl.textContent=fmt(x.p,k);pcEl.className="pc "+s2;pcEl.textContent=fmtPc(x.c);});
};
const yj=async s=>{const t=await fetch("https://r.jina.ai/http://query1.finance.yahoo.com/v8/finance/chart/"+s+"?interval=1d&range=2d").then(r=>r.text());const j=JSON.parse(t.slice(t.indexOf("{"))).chart.result[0];const m=j.meta,o=j.indicators.quote[0];const p=+m.regularMarketPrice||+o.close.at(-1)||0;const pv=+m.chartPreviousClose||+o.close.at(-2)||p;const c=pv?(p/pv-1)*100:0;const v=+m.regularMarketVolume||+o.volume?.at(-1)||0;return{p:p/u,c,v:v/u};};
const load=async()=>{
$dot.className="dot ld";$stxt.textContent="جارٍ تحديث البيانات الحقيقية…";let loaded=0;
try{const j=await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+Object.keys(CG).join(",")+"&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true").then(r=>r.json());for(const i in CG){const k=CG[i],x=j[i];if(x?.usd){D[k]={p:x.usd/u,c:x.usd_24h_change||0,v:(x.usd_24h_vol||0)/u};real[k]=true;loaded++;}}}catch(e){}
try{const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);const[t,y]=await Promise.all([fetch("https://api.frankfurter.app/latest?from=USD&to="+FX.join(",")).then(r=>r.json()),fetch("https://api.frankfurter.app/"+yest+"?from=USD&to="+FX.join(",")).then(r=>r.json())]);FX.forEach(k=>{const p=1/t.rates[k]/u,pv=1/y.rates[k]/u;D[k+"/USDT"]={p,c:pv?(p/pv-1)*100:0,v:0};real[k+"/USDT"]=true;loaded++;});}catch(e){}
await Promise.all(Object.entries(MT).map(async([k,s])=>{try{const d=await yj(s);if(d.p>0){D[k]=d;real[k]=true;loaded++;}}catch(e){}}));
$dot.className="dot";$stxt.textContent=loaded>0?`● بيانات حقيقية (${loaded} رمز) • محاكاة لحظية مفعّلة`:"● محاكاة لحظية • لم تُحمَّل بيانات حقيقية";draw();
};
$b.innerHTML=T.map((x,i)=>`<button class="tab${i?"":" on"}">${x[0]}</button>`).join("");
[...$b.children].forEach((e,i)=>e.onclick=()=>{tab=i;draw();});
$q.oninput=draw;
document.querySelectorAll(".n").forEach(n=>{n.onclick=()=>{document.querySelectorAll(".n").forEach(x=>x.classList.remove("act","hm"));n.classList.add("act");if(n.id==="nHome")n.classList.add("hm");};});
draw();
setInterval(simTick,1500);
load();
setInterval(load,60000);
</script>
</body>
</html>
