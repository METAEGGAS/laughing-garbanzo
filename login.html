<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rewards Await</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  background:#dff7f8;
  font-family:Arial,Helvetica,sans-serif;
}
.app{
  width:100%;
  max-width:560px;
  min-height:100vh;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#1a98fb 0%,#0f57ff 33%,#dff7f8 33.1%,#dff7f8 100%);
}
.shape1,.shape2{
  position:absolute;
  transform:rotate(45deg);
  border-radius:34px;
  background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.03));
}
.shape1{width:220px;height:220px;top:-70px;left:-70px}
.shape2{width:260px;height:260px;top:-40px;right:-110px}
.top{
  position:relative;
  height:250px;
  padding:82px 14px 0;
}
.back{
  position:absolute;
  top:88px;
  left:14px;
  color:#d5ff7f;
  font-size:42px;
  line-height:1;
  user-select:none;
}
.title{
  margin:78px 0 0 18px;
  color:#fff;
  font-size:28px;
  font-weight:400;
  letter-spacing:.2px;
}
.memo{
  position:absolute;
  right:42px;
  top:146px;
  width:112px;
  height:44px;
  background:#f4c334;
  border-radius:8px 8px 0 0;
}
.memo:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-11px;
  height:12px;
  background:#fff;
  border-radius:0 0 8px 8px;
}
.memo span{
  position:absolute;
  top:-8px;
  width:12px;
  height:12px;
  border:3px solid #cfd6dc;
  border-bottom:none;
  border-radius:8px 8px 0 0;
}
.memo span:nth-child(1){left:11px}
.memo span:nth-child(2){left:34px}
.memo span:nth-child(3){left:57px}
.memo span:nth-child(4){left:80px}

.card{
  background:#fff;
  margin:0 11px 18px;
  border-radius:18px;
  box-shadow:0 8px 22px rgba(29,80,140,.08);
  padding:14px;
}
.card.sign{margin-top:-10px}
.label{
  color:#7d8d97;
  font-size:15px;
  font-weight:600;
  margin:2px 0 12px 6px;
}
.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.day{
  height:78px;
  border-radius:10px;
  background:#eef9ff;
  color:#9aa7b0;
  text-align:center;
  padding-top:13px;
  box-shadow:inset 0 0 0 1px rgba(91,156,200,.08);
  font-size:11px;
  font-weight:700;
}
.day strong{
  display:block;
  font-size:20px;
  margin-top:2px;
}
.dot{
  width:16px;
  height:16px;
  margin:13px auto 0;
  border-radius:50%;
  border:2px solid #d7e6ef;
  background:#f9fdff;
}
.day.active{
  background:linear-gradient(180deg,#146ef0,#105fe6);
  color:#fff;
  box-shadow:0 8px 18px rgba(16,95,230,.28);
}
.day.active .dot{
  border:none;
  background:#fff;
  position:relative;
}
.day.active .dot:before{
  content:"✓";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#1268eb;
  font-size:11px;
  font-weight:900;
}
.btn{
  margin:16px 7px 4px;
  height:60px;
  border:none;
  border-radius:14px;
  background:linear-gradient(180deg,#76b2eb,#6ca7e5);
  color:#edf8ff;
  font-size:18px;
  cursor:default;
}
.rules-title{
  color:#31383f;
  font-size:16px;
  font-weight:700;
  margin:2px 0 14px 6px;
}
.table{
  border:1px solid #d8e6f3;
  border-radius:16px;
  overflow:hidden;
}
.head,.row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}
.head div{
  background:#0f72ef;
  color:#b7daff;
  text-align:center;
  padding:15px 0 14px;
  font-size:11px;
  font-weight:700;
  border-right:1px solid rgba(255,255,255,.08);
}
.row div{
  background:#fff;
  color:#666;
  text-align:center;
  padding:18px 0 20px;
  font-size:14px;
  border-right:1px solid #dce6ef;
}
.head div:last-child,.row div:last-child{border-right:none}
.note{
  color:#787878;
  font-size:12px;
  font-weight:600;
  margin:13px 4px 2px;
}
@media (max-width:430px){
  .title{font-size:25px}
  .day{height:72px;font-size:10px}
  .day strong{font-size:18px}
  .btn{height:56px;font-size:17px}
}
</style>
</head>
<body>
  <div class="app">
    <div class="shape1"></div>
    <div class="shape2"></div>

    <div class="top">
      <div class="back">‹</div>
      <div class="title">Rewards await</div>

      <div class="memo">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="card sign">
      <div class="label">Signed</div>

      <div class="days">
        <div class="day active">Day<strong>1</strong><div class="dot"></div></div>
        <div class="day">Day<strong>2</strong><div class="dot"></div></div>
        <div class="day">Day<strong>3</strong><div class="dot"></div></div>
        <div class="day">Day<strong>4</strong><div class="dot"></div></div>
        <div class="day">Day<strong>5</strong><div class="dot"></div></div>
        <div class="day">Day<strong>6</strong><div class="dot"></div></div>
        <div class="day">Day<strong>7</strong><div class="dot"></div></div>
      </div>

      <button class="btn">Signed in today</button>
    </div>

    <div class="card">
      <div class="rules-title">Reward rules</div>

      <div class="table">
        <div class="head">
          <div>Day 1</div>
          <div>Day 2</div>
          <div>Day 3</div>
          <div>Day 4</div>
          <div>Day 5</div>
          <div>Day 6</div>
          <div>Day 7</div>
        </div>
        <div class="row">
          <div>0.02U</div>
          <div>0.03U</div>
          <div>0.04U</div>
          <div>0.05U</div>
          <div>0.06U</div>
          <div>0.07U</div>
          <div>0.08U</div>
        </div>
      </div>

      <div class="note">(Instant settlement, view account change history)</div>
    </div>
  </div>
</body>
</html>
