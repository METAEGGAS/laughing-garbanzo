ize:18px;font-weight:800;cursor:pointer}.fee{font-size:14px;color:#666;margin-top:-18px}.btn{width:100%;height:56px;border:0;border-radius:999px;background:#f3d86b;color:#111;font-size:20px;font-weight:800;margin-top:26px;cursor:pointer}.pg{display:none}.on{display:block}.emp{text-align:center;color:#999;font-size:17px;padding:26px 10px}.card{background:#fff;border:1px solid #eee;border-radius:18px;padding:14px 16px;margin:0 0 14px}.row{display:flex;justify-content:space-between;gap:12px;margin:8px 0;font-size:15px}.k{color:#888}.v{font-weight:700;word-break:break-all;text-align:left}.st,.tp{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:800}.st{color:#fff}.tp{color:#111;background:#fff;border:1px solid #eee}.y{background:#f0b90b}.g{background:#16a34a}.rj{background:#dc2626}.ov{position:fixed;inset:0;background:rgba(0,0,0,.18);display:none;align-items:center;justify-content:center;padding:16px;z-index:9}.m{width:100%;max-width:420px;background:#fff;border-radius:22px;padding:18px;border:1px solid #eee}.mt{font-size:22px;font-weight:800;text-align:center;margin:0 0 14px}.mf{height:54px;border:1px solid #eee;border-radius:14px;padding:0 14px;display:flex;align-items:center;margin:0 0 12px;background:#fff}.rb{display:flex;gap:10px;margin-top:8px}.rb button{flex:1;height:50px;border:0;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer}.ok{background:#f3d86b}.no{background:#f3f4f6}@media(max-width:420px){._w{padding:18px 16px 24px}._ti{font-size:22px}._f{height:68px}.u{font-size:18px}}</style></head><body><div id="w" class="_w on"><div class="_t"><button class="_ib" onclick="history.back()" aria-label="رجوع"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/><path d="M9 12h10"/></svg></button><div class="_ti">ينسحب</div><button class="_ir" onclick="sh()" aria-label="سجل"><svg width="28" height="28" viewBox="0 0 24 24" fill="no
